<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Exercici006 · Formulari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="estils.css">
</head>

<body>
  <header class="navbar">
    <nav class="container-flex">
      <a class="brand" href="#">
        <span class="material-icons-outlined">assignment</span>Formulario
      </a>

      <input id="menu-toggle" type="checkbox" class="menu-checkbox" />
      <label for="menu-toggle" class="menu_pequeño" aria-hidden="true">
        <span></span><span></span><span></span>
      </label>

      <div class="nav-links responsive-menu">
        <a href="index.html">
          <span class="material-icons-outlined">assignment</span> Formulario
        </a>
        <a href="interaccio.html">
          <span class="material-icons-outlined">animation</span> Interactividad
        </a>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1>Pedido</h1>

    <form class="formulario">

      <label class="field">
        <span>Nombre completo*</span>
        <input type="text" name="fullname" required pattern="^[A-Za-zÀ-ÿ\u00f1\u00d1\s]{3,40}$"
          title="Introduce solo letras y espacios (3-40 caracteres)." placeholder="Ej. María Pérez">
      </label>

      <label class="field">
        <span>Correo electrónico</span>
        <input type="email" name="email" required placeholder="tu@ejemplo.com">
        <span class="error">Introduce un correo electrónico válido.</span>
      </label>

      <label class="field">
        <span>Teléfono</span>
        <input type="tel" name="phone" pattern="^\+?\d{9,15}$"
          title="Número internacional: solo dígitos, opcional prefijo +, 9-15 dígitos" placeholder="+34123456789">
      </label>

      <label class="field">
        <span>Edad</span>
        <input type="number" name="edad" min="14" max="120" step="1" placeholder="25">
      </label>

      <label class="field">
        <span>Fecha de nacimiento</span>
        <input type="date" name="nacimiento">
      </label>

      <label class="field">
        <span>Franja horaria preferida</span>
        <input type="time" name="franja">
      </label>

      <label class="field color-field">
        <span>Color preferido</span>
        <input type="color" name="color">
      </label>

      <label class="field range-field">
        <span>Control deslizante (satisfacción)</span>
        <input type="range" name="satisfaccion" min="0" max="10" value="5">
        <output class="range-value">5</output>
      </label>

      <fieldset class="fieldset">
        <legend>Aficiones</legend>
        <label class="checkbox">
          <input type="checkbox" name="aficion" value="leer">
          <span class="custom-check"></span>
          Leer
        </label>
        <label class="checkbox">
          <input type="checkbox" name="aficion" value="deporte">
          <span class="custom-check"></span>
          Deporte
        </label>
        <label class="checkbox">
          <input type="checkbox" name="aficion" value="cine">
          <span class="custom-check"></span>
          Cine
        </label>
        <label class="checkbox">
          <input type="checkbox" name="aficion" value="programar">
          <span class="custom-check"></span>
          Programar
        </label>
      </fieldset>

      <fieldset class="fieldset">
        <legend>Nivel de estudios</legend>
        <label class="radio">
          <input type="radio" name="estudios" value="eso">
          <span class="custom-radio"></span>
          ESO
        </label>
        <label class="radio">
          <input type="radio" name="estudios" value="bachillerato">
          <span class="custom-radio"></span>
          Bachillerato
        </label>
        <label class="radio">
          <input type="radio" name="estudios" value="grado">
          <span class="custom-radio"></span>
          Grado/Formación
        </label>
      </fieldset>

      <label class="field">
        <span>País</span>
        <select name="pais" required>
          <option value="">— Selecciona —</option>
          <option>España</option>
          <option>Portugal</option>
          <option>Francia</option>
          <option>Alemania</option>
          <option>Otro</option>
        </select>
      </label>

      <label class="field">
        <span>Comentarios</span>
        <textarea name="comentarios" rows="4" placeholder="Escribe aquí..."></textarea>
      </label>

      <div class="botones">
        <button type="submit" class="btn primary">Enviar</button>
        <button type="reset" class="btn ghost">Borrar</button>
      </div>
    </form>
  </main>

  <footer class="footer">
    <p>Proyecto: DAM1M04 · Exercici006 — HTML + CSS</p>
  </footer>
</body>

</html>
